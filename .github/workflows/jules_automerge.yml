name: 1. Auto-Validate and Merge Jules PRs

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'google-jules[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'jules')

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Linters (Ruff)
        run: uv run ruff check .

      - name: Run Tests
        run: |
          if [ -d "tests" ]; then
            uv run pytest tests -q
          else
            echo "No tests directory found, skipping pytest."
          fi

      - name: Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch
